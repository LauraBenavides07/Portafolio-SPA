     Caja de mensajes guardados del formulario de contacto.
     Se actualiza dinámicamente por JS renderSaved().
-->
<div class="saved-section">
  <div class="saved-header">
    <span class="saved-title">
      <i class="bi bi-inbox me-1"></i>Mensajes recibidos
    </span>
    <span class="saved-count" id="savedCount">0</span>
  </div>
  <div class="saved-box" id="savedBox">
    <div class="saved-empty" id="savedEmpty">
      <i class="bi bi-chat-dots"
         style="font-size:1.5rem;display:block;margin-bottom:.4rem;color:var(--rose-200)"></i>
      Aún no hay mensajes guardados
    </div>
  </div>
</div>
