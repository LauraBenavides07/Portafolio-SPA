<!-- MOLECULE: contact-form.html
     Formulario de contacto completo con validación JS.
     Requiere: JS sendForm(), vName(), vEmail(), etc.
-->
<form id="contactForm" novalidate onsubmit="sendForm(event)">

  <!-- Nombre + Correo -->
  <div class="row g-3 mb-3">
    <div class="col-sm-6">
      <label class="flabel" for="fName">Nombre completo *</label>
      <input type="text" id="fName" class="finput" placeholder="Tu nombre completo">
      <div class="ferr" id="eN">⚠️ Nombre obligatorio (mín. 2 caracteres)</div>
    </div>
    <div class="col-sm-6">
      <label class="flabel" for="fEmail">Correo electrónico *</label>
      <input type="email" id="fEmail" class="finput" placeholder="tu@correo.com">
      <div class="ferr" id="eE">⚠️ Ingresa un correo válido</div>
    </div>
  </div>

  <!-- Teléfono + Motivo -->
  <div class="row g-3 mb-3">
    <div class="col-sm-6">
      <label class="flabel" for="fPhone">Teléfono</label>
      <input type="tel" id="fPhone" class="finput" placeholder="+57 300 000 0000">
      <div class="ferr" id="eP">⚠️ Formato inválido</div>
    </div>
    <div class="col-sm-6">
      <label class="flabel" for="fMot">Motivo de contacto *</label>
      <select id="fMot" class="finput">
        <option value="">Selecciona un motivo...</option>
        <option>Propuesta laboral</option>
        <option>Colaboración en proyecto</option>
        <option>Consulta técnica</option>
        <option>Otro</option>
      </select>
      <div class="ferr" id="eM">⚠️ Selecciona un motivo</div>
    </div>
  </div>

  <!-- Mensaje -->
  <div class="mb-3">
    <label class="flabel" for="fMsg">Mensaje *</label>
    <textarea id="fMsg" class="finput" placeholder="Cuéntame en qué puedo ayudarte..."></textarea>
    <div class="ferr" id="eMg">⚠️ El mensaje debe tener al menos 10 caracteres</div>
  </div>

  <!-- Preferencia de respuesta (solo correo o teléfono) -->
  <div class="mb-3">
    <label class="flabel">Preferencia de respuesta</label>
    <div class="d-flex gap-2">
      <label class="pref-opt">
        <input type="radio" name="pref" value="correo" checked>
        📧 Correo
      </label>
      <label class="pref-opt">
        <input type="radio" name="pref" value="telefono">
        📞 Teléfono
      </label>
    </div>
  </div>

  <!-- Términos y condiciones -->
  <div class="mb-4">
    <label class="terms-row">
      <input type="checkbox" id="fTerms">
      <span>Acepto que mis datos sean usados únicamente para responder este mensaje.</span>
    </label>
    <div class="ferr" id="eT">⚠️ Debes aceptar los términos para continuar</div>
  </div>

  <button type="submit" class="btn-send">
    <i class="bi bi-send me-2"></i> Enviar mensaje
  </button>

</form>
